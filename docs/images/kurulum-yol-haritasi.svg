<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">Supabase Türkiye kurulum yol haritası</title><desc id="desc">GitHub, Coolify, domain, deploy ve Studio adımlarını gösterir.</desc>
  <rect width="1200" height="260" fill="#f7faf9"/><text x="60" y="52" font-family="Arial" font-size="28" font-weight="700" fill="#12221d">Beş adımda kendi Supabase sunucun</text>
  <g font-family="Arial" text-anchor="middle"><g fill="#fff" stroke="#2b8a6e" stroke-width="3">
    <rect x="45" y="92" width="180" height="105" rx="8"/><rect x="280" y="92" width="180" height="105" rx="8"/><rect x="515" y="92" width="180" height="105" rx="8"/><rect x="750" y="92" width="180" height="105" rx="8"/><rect x="985" y="92" width="180" height="105" rx="8"/>
  </g><g fill="#12221d" font-size="18" font-weight="700"><text x="135" y="130">1. Repoyu forkla</text><text x="370" y="130">2. Coolify'ye ekle</text><text x="605" y="130">3. Domain + secret</text><text x="840" y="130">4. Deploy et</text><text x="1075" y="130">5. Studio'ya gir</text></g>
