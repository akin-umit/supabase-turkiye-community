name: Hata bildirimi / Bug report
description: Tekrar uretilebilir bir hata bildirin
title: "[Bug]: "
labels: ["needs-reproduction"]
body:
  - type: markdown
    attributes:
      value: "Secret, token, private domain veya veritabani dump'i eklemeyin."
  - type: textarea
    id: description
    attributes:
      label: Hata
      description: Beklenen ve gerceklesen davranisi yazin.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Tekrar uretim adimlari
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit veya surum
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Ortam
      description: Docker/Coolify surumu ve isletim sistemi; secret eklemeyin.
