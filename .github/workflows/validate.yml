name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  compose-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config -q
      - name: Check shell syntax
        run: |
          find . -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Test function secret management
        run: bash tests/test-function-secrets.sh
      - name: Reject private deployment artifacts
        run: |
          if grep -RInE '(sk_live_[A-Za-z0-9]{16,}|rk_live_[A-Za-z0-9]{16,}|whsec_[A-Za-z0-9]{24,}|gh[pousr]_[A-Za-z0-9]{20,}|-----BEGIN ([A-Z ]+ )?PRIVATE KEY-----)' \
            --exclude-dir=.git .; then
            echo 'Credential-like value or private key detected.'
            exit 1
          fi

          forbidden_files="$(git ls-files | grep -E '(^|/)(\.env($|\.)|private/|backups/|.*\.(dump|sql\.gz|tar\.gz)$)' \
            | grep -v '^\.env\.example$' || true)"
          if [ -n "$forbidden_files" ]; then
            echo 'Private environment or backup files must not be tracked:'
            echo "$forbidden_files"
            exit 1
          fi
